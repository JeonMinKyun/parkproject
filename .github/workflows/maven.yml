name: Java CI with Maven

on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 소스 코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # Maven Build
      - name: Build with Maven
        run: mvn clean verify -DskipTests -f ./park_project/pom.xml

      # 멀티 아키텍처 빌드를 위한 QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 이미지 Build 및 Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./park_project
          file: ./park_project/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/parkproject:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # 원격 서버 배포
      - name: Deploy Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 0.tcp.jp.ngrok.io
          username: ubuntu
          password: ubuntu
          port: 25631
          script: |
            docker stop park || true
            docker rm park || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/parkproject:latest

            docker run -d \
              --name park \
              -p 8083:8080 \
              ${{ secrets.DOCKER_USERNAME }}/parkproject:latest